<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chi siamo – MySite</title>
  <style>
    :root {
      --bg:    #050e18;
      --cyan:  #00d4ff;
      --green: #00ff9d;
      --dim:   #2a5a70;
      --text:  #8bbfcf;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    #orbits {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      padding: 2rem 1rem 4rem;
    }

    .ping {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 0 0 #00d4ff88;
      animation: ripple 1.8s ease-out infinite;
    }
    @keyframes ripple {
      0%   { box-shadow: 0 0 0 0    #00d4ff88; }
      70%  { box-shadow: 0 0 0 18px #00d4ff00; }
      100% { box-shadow: 0 0 0 0    #00d4ff00; }
    }

    .badge {
      font-size: .65rem;
      letter-spacing: .25em;
      color: var(--dim);
    }

    h1 {
      font-size: clamp(1.6rem, 5vw, 3rem);
      font-weight: 400;
      color: var(--cyan);
      letter-spacing: .1em;
      text-shadow: 0 0 20px #00d4ff66;
      animation: fadeIn 1s ease both;
    }

    h1 span { color: var(--green); text-shadow: 0 0 20px #00ff9d66; }

    .subtitle {
      font-size: .85rem;
      color: var(--text);
      opacity: .7;
      letter-spacing: .06em;
      max-width: 420px;
      line-height: 1.8;
      animation: fadeIn 1s .4s ease both;
    }

    .divider {
      width: 200px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--dim), transparent);
      margin: .4rem 0;
    }

    .team {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: .8rem;
      animation: fadeIn 1s .6s ease both;
    }

    .card {
      border: 1px solid var(--dim);
      border-radius: 4px;
      padding: 20px 24px;
      width: 180px;
      background: rgba(0, 212, 255, 0.03);
      transition: border-color .3s, box-shadow .3s;
    }
    .card:hover {
      border-color: var(--cyan);
      box-shadow: 0 0 18px #00d4ff22;
    }

    .card .avatar { font-size: 1.8rem; margin-bottom: 10px; }

    .card h3 {
      font-size: .9rem;
      font-weight: 400;
      color: var(--cyan);
      letter-spacing: .08em;
      margin-bottom: 4px;
    }

    .card span {
      font-size: .7rem;
      color: var(--green);
      letter-spacing: .15em;
      opacity: .8;
    }

    .back-btn {
      margin-top: .8rem;
      font-size: .75rem;
      letter-spacing: .2em;
      color: var(--dim);
      text-decoration: none;
      border: 1px solid var(--dim);
      padding: 8px 20px;
      border-radius: 2px;
      transition: color .3s, border-color .3s, box-shadow .3s;
      animation: fadeIn 1s .8s ease both;
    }
    .back-btn:hover {
      color: var(--cyan);
      border-color: var(--cyan);
      box-shadow: 0 0 14px #00d4ff22;
    }

    @keyframes fadeIn {
      from { opacity:0; transform: translateY(16px); }
      to   { opacity:1; transform: none; }
    }

    footer {
      position: fixed;
      bottom: 1.2rem;
      font-size: .65rem;
      letter-spacing: .15em;
      color: var(--dim);
      z-index: 1;
    }
  </style>
</head>
<body>

<canvas id="orbits"></canvas>

<div class="content">
  <div class="ping"></div>
  <span class="badge">// CHI SIAMO &ndash; TEAM</span>
  <h1>IL NOSTRO <span>TEAM</span></h1>
  <p class="subtitle">
    Persone reali dietro il server.<br/>
    Sviluppo, design e infrastruttura sotto lo stesso tetto.
  </p>
  <div class="divider"></div>

  <div class="team">
    <div class="card">
      <div class="avatar">👨‍💻</div>
      <h3>MARCO ROSSI</h3>
      <span>SVILUPPATORE</span>
    </div>
    <div class="card">
      <div class="avatar">👩‍🎨</div>
      <h3>LAURA BIANCHI</h3>
      <span>DESIGNER</span>
    </div>
    <div class="card">
      <div class="avatar">👨‍🚀</div>
      <h3>LUCA FERRARI</h3>
      <span>DEVOPS</span>
    </div>
  </div>

  <a href="index.html" class="back-btn">← TORNA ALLA HOME</a>
</div>

<footer id="clock">--:--:--</footer>

<script>
  (function tick() {
    document.getElementById('clock').textContent =
      new Date().toTimeString().slice(0, 8);
    setTimeout(tick, 1000);
  })();

  const canvas = document.getElementById('orbits');
  const ctx    = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const rings = [
    { r: 120, speed: 0.6,  nodes: 4, color: '#00d4ff' },
    { r: 210, speed: 0.35, nodes: 6, color: '#00ff9d' },
    { r: 310, speed: 0.2,  nodes: 3, color: '#00d4ff' },
    { r: 420, speed: 0.12, nodes: 5, color: '#00ff9d' },
  ];

  function draw(ts) {
    const t  = ts * 0.001;
    const ox = canvas.width  / 2;
    const oy = canvas.height / 2;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    rings.forEach(ring => {
      ctx.beginPath();
      ctx.arc(ox, oy, ring.r, 0, Math.PI * 2);
      ctx.strokeStyle = ring.color + '18';
      ctx.lineWidth   = 1;
      ctx.stroke();

      for (let i = 0; i < ring.nodes; i++) {
        const angle = t * ring.speed + (i / ring.nodes) * Math.PI * 2;
        const nx = ox + Math.cos(angle) * ring.r;
        const ny = oy + Math.sin(angle) * ring.r;

        ctx.beginPath();
        ctx.moveTo(ox, oy);
        ctx.lineTo(nx, ny);
        ctx.strokeStyle = ring.color + '14';
        ctx.lineWidth   = 1;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(nx, ny, 3, 0, Math.PI * 2);
        ctx.fillStyle   = ring.color;
        ctx.shadowColor = ring.color;
        ctx.shadowBlur  = 12;
        ctx.fill();
        ctx.shadowBlur  = 0;
      }
    });

    const pulse = 0.5 + 0.5 * Math.sin(t * 2);
    ctx.beginPath();
    ctx.arc(ox, oy, 6 + pulse * 3, 0, Math.PI * 2);
    ctx.fillStyle   = '#00ff9d';
    ctx.shadowColor = '#00ff9d';
    ctx.shadowBlur  = 20 + pulse * 20;
    ctx.fill();
    ctx.shadowBlur  = 0;

    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);
</script>
</body>
</html>
