<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contatti — Francesco Pesaresi</title>
  <style>
    :root {
      --bg:    #050e18;
      --cyan:  #00d4ff;
      --green: #00ff9d;
      --dim:   #2a5a70;
      --text:  #8bbfcf;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #orbits {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
    }

    .badge {
      font-size: .65rem;
      letter-spacing: .25em;
      color: var(--dim);
    }

    h1 {
      font-size: clamp(1.6rem, 5vw, 3rem);
      font-weight: 400;
      color: var(--cyan);
      letter-spacing: .1em;
      text-shadow: 0 0 20px #00d4ff66;
      animation: fadeIn 1s ease both;
    }

    h1 span { color: var(--green); text-shadow: 0 0 20px #00ff9d66; }

    .contact-list {
      display: flex;
      flex-direction: column;
      gap: .85rem;
      margin-top: .4rem;
      animation: fadeIn 1s .4s ease both;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: .9rem;
      background: #00d4ff08;
      border: 1px solid #00d4ff18;
      border-radius: 6px;
      padding: .6rem 1.2rem;
      transition: border-color .3s, background .3s;
      cursor: default;
      min-width: 320px;
    }

    .contact-item:hover {
      border-color: #00d4ff55;
      background: #00d4ff12;
    }

    .contact-icon {
      font-size: 1.1rem;
      color: var(--green);
      text-shadow: 0 0 10px #00ff9d88;
      flex-shrink: 0;
    }

    .contact-label {
      font-size: .6rem;
      letter-spacing: .2em;
      color: var(--dim);
      text-transform: uppercase;
    }

    .contact-value {
      font-size: .82rem;
      color: var(--cyan);
      letter-spacing: .06em;
    }

    .contact-value a {
      color: inherit;
      text-decoration: none;
    }

    .contact-value a:hover {
      text-decoration: underline;
      color: var(--green);
    }

    .ping {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 0 #00ff9d88;
      animation: ripple 1.8s ease-out infinite;
    }
    @keyframes ripple {
      0%   { box-shadow: 0 0 0 0   #00ff9d88; }
      70%  { box-shadow: 0 0 0 18px #00ff9d00; }
      100% { box-shadow: 0 0 0 0   #00ff9d00; }
    }

    @keyframes fadeIn {
      from { opacity:0; transform: translateY(16px); }
      to   { opacity:1; transform: none; }
    }

    footer {
      position: fixed;
      bottom: 1.2rem;
      font-size: .65rem;
      letter-spacing: .15em;
      color: var(--dim);
      z-index: 1;
    }

    nav {
      position: fixed;
      top: 1.4rem;
      right: 1.8rem;
      z-index: 2;
      display: flex;
      gap: 1.4rem;
    }

    nav a {
      font-size: .65rem;
      letter-spacing: .2em;
      color: var(--dim);
      text-decoration: none;
      text-transform: uppercase;
      transition: color .3s;
    }

    nav a:hover,
    nav a.active {
      color: var(--cyan);
      text-shadow: 0 0 8px #00d4ff88;
    }
  </style>
</head>
<body>

<canvas id="orbits"></canvas>

<nav>
  <a href="index.html">Home</a>
  <a href="contatti.html" class="active">Contatti</a>
</nav>

<div class="content">
  <div class="ping"></div>
  <span class="badge">// CONTATTI — FRANCESCO PESARESI</span>
  <h1>CONTATTI <span>DIRETTI</span></h1>

  <div class="contact-list">

    <div class="contact-item">
      <div class="contact-icon">✉</div>
      <div>
        <div class="contact-label">Email</div>
        <div class="contact-value"><a href="mailto:francesco@example.com">francesco@example.com</a></div>
      </div>
    </div>

    <div class="contact-item">
      <div class="contact-icon">⌨</div>
      <div>
        <div class="contact-label">GitHub</div>
        <div class="contact-value"><a href="https://github.com/" target="_blank">github.com/francescopesaresi</a></div>
      </div>
    </div>

    <div class="contact-item">
      <div class="contact-icon">◈</div>
      <div>
        <div class="contact-label">LinkedIn</div>
        <div class="contact-value"><a href="https://linkedin.com/" target="_blank">linkedin.com/in/francescopesaresi</a></div>
      </div>
    </div>

    <div class="contact-item">
      <div class="contact-icon">◉</div>
      <div>
        <div class="contact-label">Telefono</div>
        <div class="contact-value"><a href="tel:+390000000000">+39 000 000 0000</a></div>
      </div>
    </div>

  </div>
</div>

<footer id="clock">--:--:--</footer>

<script>
  // Orologio
  (function tick() {
    document.getElementById('clock').textContent =
      new Date().toTimeString().slice(0, 8);
    setTimeout(tick, 1000);
  })();

  // Orbite su Canvas
  const canvas = document.getElementById('orbits');
  const ctx    = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const rings = [
    { r: 120, speed: 0.8, nodes: 3, color: '#00d4ff' },
    { r: 200, speed: 0.5, nodes: 5, color: '#00ff9d' },
    { r: 290, speed: 0.3, nodes: 7, color: '#00d4ff' },
    { r: 390, speed: 0.2, nodes: 4, color: '#00ff9d' },
  ];

  function draw(ts) {
    const t  = ts * 0.001;
    const ox = canvas.width  / 2;
    const oy = canvas.height / 2;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    rings.forEach(ring => {
      ctx.beginPath();
      ctx.arc(ox, oy, ring.r, 0, Math.PI * 2);
      ctx.strokeStyle = ring.color + '18';
      ctx.lineWidth   = 1;
      ctx.stroke();

      for (let i = 0; i < ring.nodes; i++) {
        const angle = t * ring.speed + (i / ring.nodes) * Math.PI * 2;
        const nx = ox + Math.cos(angle) * ring.r;
        const ny = oy + Math.sin(angle) * ring.r;

        ctx.beginPath();
        ctx.moveTo(ox, oy);
        ctx.lineTo(nx, ny);
        ctx.strokeStyle = ring.color + '14';
        ctx.lineWidth   = 1;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(nx, ny, 3, 0, Math.PI * 2);
        ctx.fillStyle   = ring.color;
        ctx.shadowColor = ring.color;
        ctx.shadowBlur  = 12;
        ctx.fill();
        ctx.shadowBlur  = 0;
      }
    });

    const pulse = 0.5 + 0.5 * Math.sin(t * 2);
    ctx.beginPath();
    ctx.arc(ox, oy, 6 + pulse * 3, 0, Math.PI * 2);
    ctx.fillStyle   = '#00d4ff';
    ctx.shadowColor = '#00d4ff';
    ctx.shadowBlur  = 20 + pulse * 20;
    ctx.fill();
    ctx.shadowBlur  = 0;

    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);
</script>
</body>
</html>
